# pytest configuration
[pytest]
DJANGO_SETTINGS_MODULE = backend_project.settings
python_files = tests.py test_*.py *_tests.py conftest.py
python_classes = Test* 
python_functions = test_*

# Markers
markers =
    django_db: Tests that require database
    slow: Slow tests
    integration: Integration tests
    smoke: Smoke tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    
testpaths = .

norecursedirs = .git .tox dist build *.egg staticfiles media
